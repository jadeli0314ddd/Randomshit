<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tipsy - Alcohol Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.1); }
        body { background-color: #fdfbf7; font-family: ui-sans-serif, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold tracking-tight text-stone-800">TIPSY <span id="status-emoji">🍸</span></h1>
        <div class="text-right">
            <p class="text-[10px] text-stone-400 uppercase font-bold tracking-widest">Current Status</p>
            <p id="status-text" class="text-emerald-500 font-bold">Sober</p>
        </div>
    </header>

    <div class="glass rounded-[2rem] p-6 mb-8 shadow-sm">
        <div class="grid grid-cols-2 gap-4">
            <div class="text-center">
                <p class="text-3xl font-bold text-stone-800" id="drink-count">0</p>
                <p class="text-[10px] text-stone-400 uppercase font-bold">Drinks</p>
            </div>
            <div class="text-center">
                <p class="text-3xl font-bold text-amber-500" id="bac-level">0.000</p>
                <p class="text-[10px] text-stone-400 uppercase font-bold">Current BAC %</p>
            </div>
        </div>
    </div>

    <h2 class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-4 ml-1">Drink Menu</h2>
    <div class="grid grid-cols-2 gap-3" id="drink-menu">
        </div>

    <button onclick="resetData()" class="mt-10 w-full py-4 text-stone-300 text-[10px] font-bold uppercase tracking-widest border-2 border-dashed border-stone-200 rounded-2xl active:bg-stone-50 transition-colors">
        Reset Session
    </button>

    <script>
        const drinks = [
            { name: 'Beer', icon: '🍺', abv: 5, vol: 330 },
            { name: 'Wine', icon: '🍷', abv: 13, vol: 150 },
            { name: 'Cocktail', icon: '🍹', abv: 12, vol: 250 },
            { name: 'Shot', icon: '🍶', abv: 40, vol: 45 }
        ];

        let state = { count: 0, bac: 0 };

        function updateUI() {
            document.getElementById('drink-count').innerText = state.count;
            document.getElementById('bac-level').innerText = state.bac.toFixed(3);
            
            const statusText = document.getElementById('status-text');
            if (state.bac > 0.08) {
                statusText.innerText = "Wasted";
                statusText.className = "text-rose-500 font-bold";
            } else if (state.bac > 0.04) {
                statusText.innerText = "Tipsy";
                statusText.className = "text-amber-500 font-bold";
            } else {
                statusText.innerText = "Sober";
                statusText.className = "text-emerald-500 font-bold";
            }
        }

        function logDrink(abv, vol) {
            state.count += 1;
            // Simplified BAC formula for 55kg Female
            const alcoholGrams = (vol * (abv / 100)) * 0.789;
            const bacGain = (alcoholGrams / (55 * 0.55 * 10)) * 0.1; 
            state.bac += bacGain;
            updateUI();
        }

        function resetData() {
            if(confirm("Start a new session?")) {
                state = { count: 0, bac: 0 };
                updateUI();
            }
        }

        // Initialize Menu
        const menu = document.getElementById('drink-menu');
        drinks.forEach(d => {
            const btn = document.createElement('div');
            btn.className = "glass rounded-[1.8rem] p-5 text-center active:scale-95 transition-transform cursor-pointer shadow-sm";
            btn.innerHTML = `
                <div class="text-4xl mb-3">${d.icon}</div>
                <div class="font-bold text-stone-800 text-sm">${d.name}</div>
                <div class="text-[10px] text-stone-400 font-bold uppercase">${d.abv}% • ${d.vol}ml</div>
            `;
            btn.onclick = () => logDrink(d.abv, d.vol);
            menu.appendChild(btn);
        });
    </script>
</body>
</html>
